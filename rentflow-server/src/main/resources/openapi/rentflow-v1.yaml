openapi: 3.1.0
info:
  title: RentFlow API
  version: 1.0.0
  description: RentFlow digital commerce API. Business timestamps include an offset and are stored as UTC.
servers:
  - url: http://localhost:8080
tags:
  - name: Authentication
  - name: Catalog
  - name: Notifications
  - name: Store
security:
  - bearerAuth: []
paths:
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/categories:
    get:
      tags: [Catalog]
      operationId: listCategories
      security: []
      responses:
        '200':
          description: Categories in stable sort order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /api/v1/catalog/use-cases:
    get:
      tags: [Catalog]
      operationId: listCatalogUseCases
      security: []
      responses:
        '200':
          description: Active dynamic catalog use cases and aliases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogUseCase'

  /api/v1/products:
    get:
      tags: [Catalog]
      operationId: searchProducts
      security: []
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
            maxLength: 128
        - name: equipmentRole
          in: query
          description: Exact structured equipment role used by scenario planning.
          schema:
            type: string
            pattern: '^[a-z0-9_]{1,64}$'
        - name: brand
          in: query
          description: Case-insensitive exact product brand.
          schema:
            type: string
            maxLength: 64
        - name: model
          in: query
          description: Case-insensitive exact product model.
          schema:
            type: string
            maxLength: 64
        - name: useCaseId
          in: query
          description: Exact dynamic catalog use case identifier.
          schema:
            $ref: '#/components/schemas/Ulid'
        - name: categoryId
          in: query
          schema:
            $ref: '#/components/schemas/Ulid'
        - name: maxPrice
          in: query
          description: Maximum enabled SKU sale price.
          schema:
            type: number
            exclusiveMinimum: 0
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Stable product search page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Catalog]
      operationId: getProduct
      security: []
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '404':
          $ref: '#/components/responses/ProductNotFound'

  /api/v1/notifications:
    get:
      tags: [Notifications]
      operationId: listNotifications
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Notification page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'
  /api/v1/notifications/unread-count:
    get:
      tags: [Notifications]
      operationId: getUnreadNotificationCount
      responses:
        '200':
          description: Unread notification count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadNotificationCount'
  /api/v1/notifications/{notificationId}/read:
    post:
      tags: [Notifications]
      operationId: markNotificationRead
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Ulid'
      responses:
        '204':
          description: Notification marked read

  /api/v1/store/products/{productId}/skus:
    get:
      tags: [Store]
      operationId: listStoreProductSkus
      security: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Enabled purchasable SKUs with current available stock
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoreSku'

  /api/v1/store/skus/{skuId}:
    get:
      tags: [Store]
      operationId: getStoreSku
      security: []
      parameters:
        - $ref: '#/components/parameters/SkuId'
      responses:
        '200':
          description: Current SKU price and available stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreSku'

  /api/v1/store/products/{productId}/reviews:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Store]
      operationId: listStoreProductReviews
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Verified-purchase reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreReviewPage'
    post:
      tags: [Store]
      operationId: createStoreProductReview
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreReviewRequest'
      responses:
        '201':
          description: Review created from the earliest received unreviewed order item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreReview'

  /api/v1/store/orders/checkout:
    post:
      tags: [Store]
      operationId: checkoutStoreOrder
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCheckoutRequest'
      responses:
        '201':
          description: Pending-payment order created and SKU stock reserved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreOrder'
        '409':
          $ref: '#/components/responses/StateConflict'

  /api/v1/store/orders:
    get:
      tags: [Store]
      operationId: listStoreOrders
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StoreOrderStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Current user's commerce orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreOrderPage'

  /api/v1/store/orders/{orderId}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    get:
      tags: [Store]
      operationId: getStoreOrder
      responses:
        '200':
          description: Current user's commerce order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreOrder'

  /api/v1/store/orders/{orderId}/pay:
    post:
      tags: [Store]
      operationId: payStoreOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Mock payment completed and reserved stock sold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreOrder'

  /api/v1/store/orders/{orderId}/cancel:
    post:
      tags: [Store]
      operationId: cancelStoreOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Pending-payment order cancelled and reserved stock released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreOrder'

  /api/v1/store/orders/{orderId}/receive:
    post:
      tags: [Store]
      operationId: receiveStoreOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Shipped order confirmed received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreOrder'

  /api/v1/store/admin/orders/{orderId}/ship:
    post:
      tags: [Store]
      operationId: shipStoreOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreShipRequest'
      responses:
        '200':
          description: Paid order shipped by an administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreOrder'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    SkuId:
      name: skuId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Reuse only when retrying the same business intent.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[ -~]{16,128}$'
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/Ulid'

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: Request validation failed
            correlationId: 01J00000000000000000090006
            details: {}
    AuthenticationRequired:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AUTHENTICATION_REQUIRED
            message: Authentication is required
            correlationId: 01J00000000000000000090007
            details: {}
    AccessDenied:
      description: The authenticated user does not own the resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: ACCESS_DENIED
            message: Access is denied
            correlationId: 01J00000000000000000090008
            details: {}
    ProductNotFound:
      description: Product not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: PRODUCT_NOT_FOUND
            message: Product was not found
            correlationId: 01J00000000000000000090009
            details: {}
    StateConflict:
      description: Resource state does not permit the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: STORE_ORDER_STATE_CONFLICT
            message: Store order state does not permit this operation
            correlationId: 01J00000000000000000090012
            details: {}

  schemas:
    Ulid:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
      example: 01J00000000000000000000001
    Timestamp:
      type: string
      format: date-time
      example: '2026-07-17T10:00:00Z'
    Money:
      type: string
      pattern: '^(0|[1-9][0-9]*)\.[0-9]{2}$'
      example: '200.00'
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
        password:
          type: string
          minLength: 1
          maxLength: 128
          writeOnly: true
    LoginResponse:
      type: object
      additionalProperties: false
      required: [accessToken, tokenType, expiresIn, user]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          const: Bearer
        expiresIn:
          type: integer
          format: int64
          minimum: 1
          description: Access token lifetime in seconds.
        user:
          $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      additionalProperties: false
      required: [userId, nickname, role, timezone]
      properties:
        userId:
          $ref: '#/components/schemas/Ulid'
        nickname:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        timezone:
          type: string
          example: Asia/Shanghai
    Category:
      type: object
      additionalProperties: false
      required: [categoryId, name, sortOrder]
      properties:
        categoryId:
          $ref: '#/components/schemas/Ulid'
        name:
          type: string
        sortOrder:
          type: integer
    CatalogUseCase:
      type: object
      additionalProperties: false
      required: [id, code, name, description, aliases]
      properties:
        id:
          $ref: '#/components/schemas/Ulid'
        code:
          type: string
          pattern: '^[a-z0-9_]{1,64}$'
        name:
          type: string
        description:
          type: string
        aliases:
          type: array
          items:
            type: string
    ProductUseCase:
      type: object
      additionalProperties: false
      required: [id, code, name, weight]
      properties:
        id:
          $ref: '#/components/schemas/Ulid'
        code:
          type: string
        name:
          type: string
        weight:
          type: number
          exclusiveMinimum: 0
          maximum: 1
    ProductSummary:
      type: object
      additionalProperties: false
      required: [productId, categoryId, equipmentRole, name, brand, model, useCases]
      properties:
        productId:
          $ref: '#/components/schemas/Ulid'
        categoryId:
          $ref: '#/components/schemas/Ulid'
        equipmentRole:
          type: string
          pattern: '^[a-z0-9_]{1,64}$'
        name:
          type: string
        brand:
          type: string
        model:
          type: string
        useCases:
          type: array
          items:
            $ref: '#/components/schemas/ProductUseCase'
    ProductDetail:
      type: object
      additionalProperties: false
      required: [productId, categoryId, equipmentRole, name, brand, model, description, useCases]
      properties:
        productId:
          $ref: '#/components/schemas/Ulid'
        categoryId:
          $ref: '#/components/schemas/Ulid'
        equipmentRole:
          type: string
          pattern: '^[a-z0-9_]{1,64}$'
        name:
          type: string
        brand:
          type: string
        model:
          type: string
        description:
          type: string
        useCases:
          type: array
          items:
            $ref: '#/components/schemas/ProductUseCase'
    ProductPage:
      type: object
      additionalProperties: false
      required: [items, page, size, totalElements, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    Notification:
      type: object
      additionalProperties: false
      required: [id, type, title, content, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/Ulid'
        type:
          type: string
        title:
          type: string
        content:
          type: string
        aggregateType:
          type: [string, 'null']
        aggregateId:
          type: [string, 'null']
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        readAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
    NotificationPage:
      type: object
      additionalProperties: false
      required: [items, page, size, totalElements, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    UnreadNotificationCount:
      type: object
      additionalProperties: false
      required: [count]
      properties:
        count:
          type: integer
          format: int64
          minimum: 0
    StoreSku:
      type: object
      additionalProperties: false
      required: [skuId, productId, skuCode, skuName, specs, salePrice, availableQuantity, enabled]
      properties:
        skuId:
          $ref: '#/components/schemas/Ulid'
        productId:
          $ref: '#/components/schemas/Ulid'
        skuCode:
          type: string
        skuName:
          type: string
        specs:
          type: object
          additionalProperties: true
        salePrice:
          $ref: '#/components/schemas/Money'
        availableQuantity:
          type: integer
          minimum: 0
        enabled:
          type: boolean
    StoreCheckoutRequest:
      type: object
      additionalProperties: false
      required: [items, address]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: object
            additionalProperties: false
            required: [skuId, quantity]
            properties:
              skuId:
                $ref: '#/components/schemas/Ulid'
              quantity:
                type: integer
                minimum: 1
                maximum: 99
        address:
          $ref: '#/components/schemas/StoreAddress'
    StoreAddress:
      type: object
      additionalProperties: false
      required: [recipientName, recipientPhone, province, city, district, addressLine]
      properties:
        recipientName:
          type: string
          maxLength: 64
        recipientPhone:
          type: string
          maxLength: 32
        province:
          type: string
          maxLength: 64
        city:
          type: string
          maxLength: 64
        district:
          type: string
          maxLength: 64
        addressLine:
          type: string
          maxLength: 255
    StoreOrderStatus:
      type: string
      enum: [PENDING_PAYMENT, PAID, SHIPPED, RECEIVED, CANCELLED, CLOSED]
    StoreOrderItem:
      type: object
      additionalProperties: false
      required: [orderItemId, productId, skuId, productName, skuName, specs, unitPrice, quantity, subtotal]
      properties:
        orderItemId:
          $ref: '#/components/schemas/Ulid'
        productId:
          $ref: '#/components/schemas/Ulid'
        skuId:
          $ref: '#/components/schemas/Ulid'
        productName:
          type: string
        skuName:
          type: string
        specs:
          type: object
          additionalProperties: true
        unitPrice:
          $ref: '#/components/schemas/Money'
        quantity:
          type: integer
          minimum: 1
        subtotal:
          $ref: '#/components/schemas/Money'
    StoreOrder:
      type: object
      additionalProperties: false
      required: [orderId, status, currency, itemAmount, shippingAmount, payableAmount, paymentExpiresAt, createdAt, paidAt, shippedAt, receivedAt, cancelledAt, closedAt, carrier, trackingNumber, items]
      properties:
        orderId:
          $ref: '#/components/schemas/Ulid'
        status:
          $ref: '#/components/schemas/StoreOrderStatus'
        currency:
          type: string
          const: CNY
        itemAmount:
          $ref: '#/components/schemas/Money'
        shippingAmount:
          $ref: '#/components/schemas/Money'
        payableAmount:
          $ref: '#/components/schemas/Money'
        paymentExpiresAt:
          $ref: '#/components/schemas/Timestamp'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        paidAt:
          type: [string, 'null']
          format: date-time
        shippedAt:
          type: [string, 'null']
          format: date-time
        receivedAt:
          type: [string, 'null']
          format: date-time
        cancelledAt:
          type: [string, 'null']
          format: date-time
        closedAt:
          type: [string, 'null']
          format: date-time
        carrier:
          type: [string, 'null']
        trackingNumber:
          type: [string, 'null']
        items:
          type: array
          items:
            $ref: '#/components/schemas/StoreOrderItem'
    StoreOrderPage:
      type: object
      additionalProperties: false
      required: [items, page, size, totalElements, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StoreOrder'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    StoreShipRequest:
      type: object
      additionalProperties: false
      required: [carrier, trackingNumber]
      properties:
        carrier:
          type: string
          maxLength: 64
        trackingNumber:
          type: string
          maxLength: 128
    StoreReviewRequest:
      type: object
      additionalProperties: false
      required: [rating, content]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
          minLength: 1
          maxLength: 500
    StoreReview:
      type: object
      additionalProperties: false
      required: [reviewId, rating, content, reviewerName, createdAt]
      properties:
        reviewId:
          $ref: '#/components/schemas/Ulid'
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
        reviewerName:
          type: string
        createdAt:
          $ref: '#/components/schemas/Timestamp'
    StoreReviewPage:
      type: object
      additionalProperties: false
      required: [items, page, size, totalElements, totalPages, statistics]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StoreReview'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        statistics:
          type: object
          required: [averageRating, reviewCount]
          properties:
            averageRating:
              type: number
              minimum: 0
              maximum: 5
            reviewCount:
              type: integer
              format: int64
              minimum: 0
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message, correlationId, details]
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - AUTHENTICATION_REQUIRED
            - ACCESS_DENIED
            - PRODUCT_NOT_FOUND
            - IDEMPOTENCY_CONFLICT
            - IDEMPOTENCY_IN_PROGRESS
            - INVALID_ADDRESS
            - INVALID_QUANTITY
            - INVALID_ORDER_STATUS
            - SKU_NOT_FOUND
            - SKU_DISABLED
            - INSUFFICIENT_STOCK
            - ORDER_PAYMENT_EXPIRED
            - STORE_ORDER_STATE_CONFLICT
            - STORE_RESOURCE_NOT_FOUND
            - STORE_REVIEW_NOT_ELIGIBLE
            - INTERNAL_ERROR
        message:
          type: string
        correlationId:
          $ref: '#/components/schemas/Ulid'
        details:
          type: object
          additionalProperties: true
