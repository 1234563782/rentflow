openapi: 3.1.0
info:
  title: RentFlow API
  version: 1.0.0
  description: RentFlow V1 rental reservation API. All business timestamps include an offset and are stored as UTC.
servers:
  - url: http://localhost:8080
tags:
  - name: Authentication
  - name: Catalog
  - name: Availability
  - name: Pricing
  - name: Reservations
  - name: Orders
  - name: Reviews
  - name: Notifications
security:
  - bearerAuth: []
paths:
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/categories:
    get:
      tags: [Catalog]
      operationId: listCategories
      security: []
      responses:
        '200':
          description: Categories in stable sort order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /api/v1/catalog/use-cases:
    get:
      tags: [Catalog]
      operationId: listCatalogUseCases
      security: []
      responses:
        '200':
          description: Active dynamic catalog use cases and aliases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogUseCase'

  /api/v1/products:
    get:
      tags: [Catalog]
      operationId: searchProducts
      security: []
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
            maxLength: 128
        - name: equipmentRole
          in: query
          description: Exact structured equipment role used by scenario planning.
          schema:
            type: string
            pattern: '^[a-z0-9_]{1,64}$'
        - name: brand
          in: query
          description: Case-insensitive exact product brand.
          schema:
            type: string
            maxLength: 64
        - name: model
          in: query
          description: Case-insensitive exact product model.
          schema:
            type: string
            maxLength: 64
        - name: useCaseId
          in: query
          description: Exact dynamic catalog use case identifier.
          schema:
            $ref: '#/components/schemas/Ulid'
        - name: categoryId
          in: query
          schema:
            $ref: '#/components/schemas/Ulid'
        - name: maxDailyRate
          in: query
          description: Maximum daily rental rate per product.
          schema:
            type: number
            exclusiveMinimum: 0
        - name: startAt
          in: query
          description: Must be supplied together with endAt to include availability.
          schema:
            $ref: '#/components/schemas/Timestamp'
        - name: endAt
          in: query
          description: Must be supplied together with startAt to include availability.
          schema:
            $ref: '#/components/schemas/Timestamp'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Stable product search page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Catalog]
      operationId: getProduct
      security: []
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '404':
          $ref: '#/components/responses/ProductNotFound'

  /api/v1/availability/search:
    post:
      tags: [Availability]
      operationId: searchAvailability
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityRequest'
      responses:
        '200':
          description: Point-in-time availability; reservation remains authoritative.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/ProductNotFound'

  /api/v1/quotes:
    post:
      tags: [Pricing]
      operationId: createQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '201':
          description: Immutable quote. Creating a quote does not lock inventory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '404':
          $ref: '#/components/responses/ProductNotFound'

  /api/v1/reservations/{reservationId}:
    parameters:
      - $ref: '#/components/parameters/ReservationId'
    get:
      tags: [Reservations]
      operationId: getReservation
      responses:
        '200':
          description: Owner reservation with persisted and effective status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/ReservationNotFound'
  /api/v1/products/{productId}/reviews:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Reviews]
      operationId: listProductReviews
      security: []
      responses:
        '200':
          description: Product reviews sorted by newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Reviews]
      operationId: createProductReview
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created for a received order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '409':
          description: Review eligibility or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/notifications:
    get:
      tags: [Notifications]
      operationId: listNotifications
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Notification page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'
  /api/v1/notifications/unread-count:
    get:
      tags: [Notifications]
      operationId: getUnreadNotificationCount
      responses:
        '200':
          description: Unread notification count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadNotificationCount'
  /api/v1/notifications/{notificationId}/read:
    post:
      tags: [Notifications]
      operationId: markNotificationRead
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Ulid'
      responses:
        '204':
          description: Notification marked read

  /api/v1/orders:
    post:
      tags: [Orders]
      operationId: createOrder
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Pending order created with a concrete equipment hold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '409':
          description: Quote, inventory, or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                reservationExpired:
                  value:
                    code: RESERVATION_EXPIRED
                    message: Reservation has expired
                    correlationId: 01J00000000000000000090004
                    details: {}
                reservationConsumed:
                  value:
                    code: RESERVATION_STATE_CONFLICT
                    message: Reservation cannot be consumed
                    correlationId: 01J00000000000000000090005
                    details: {}
    get:
      tags: [Orders]
      operationId: listOrders
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Current user orders sorted by createdAt DESC and orderId DESC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPage'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'

  /api/v1/orders/{orderId}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    get:
      tags: [Orders]
      operationId: getOrder
      responses:
        '200':
          description: Current user order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/OrderNotFound'

  /api/v1/orders/{orderId}/confirm:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: confirmOrder
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Pending order confirmed, inventory hold consumed, and concrete equipment assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/OrderNotFound'
        '409':
          $ref: '#/components/responses/StateConflict'

  /api/v1/orders/{orderId}/receive:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: receiveOrder
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Confirmed order received by its owner after the rental starts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/OrderNotFound'
        '409':
          $ref: '#/components/responses/StateConflict'

  /api/v1/orders/{orderId}/cancel:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Pending order cancelled and inventory hold released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/OrderNotFound'
        '409':
          $ref: '#/components/responses/StateConflict'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    ReservationId:
      name: reservationId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Ulid'
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Reuse only when retrying the same business intent.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[ -~]{16,128}$'
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/Ulid'

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: Request validation failed
            correlationId: 01J00000000000000000090006
            details: {}
    AuthenticationRequired:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AUTHENTICATION_REQUIRED
            message: Authentication is required
            correlationId: 01J00000000000000000090007
            details: {}
    AccessDenied:
      description: The authenticated user does not own the resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: ACCESS_DENIED
            message: Access is denied
            correlationId: 01J00000000000000000090008
            details: {}
    ProductNotFound:
      description: Product not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: PRODUCT_NOT_FOUND
            message: Product was not found
            correlationId: 01J00000000000000000090009
            details: {}
    ReservationNotFound:
      description: Reservation not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: RESERVATION_NOT_FOUND
            message: Reservation was not found
            correlationId: 01J00000000000000000090010
            details: {}
    OrderNotFound:
      description: Order not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: ORDER_NOT_FOUND
            message: Order was not found
            correlationId: 01J00000000000000000090011
            details: {}
    StateConflict:
      description: Resource state does not permit the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: RESERVATION_STATE_CONFLICT
            message: Reservation state does not permit this operation
            correlationId: 01J00000000000000000090012
            details: {}

  schemas:
    Ulid:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
      example: 01J00000000000000000000001
    Timestamp:
      type: string
      format: date-time
      example: '2026-07-17T10:00:00Z'
    Money:
      type: string
      pattern: '^(0|[1-9][0-9]*)\.[0-9]{2}$'
      example: '200.00'
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
        password:
          type: string
          minLength: 1
          maxLength: 128
          writeOnly: true
    LoginResponse:
      type: object
      additionalProperties: false
      required: [accessToken, tokenType, expiresIn, user]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          const: Bearer
        expiresIn:
          type: integer
          format: int64
          minimum: 1
          description: Access token lifetime in seconds.
        user:
          $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      additionalProperties: false
      required: [userId, nickname, role, timezone]
      properties:
        userId:
          $ref: '#/components/schemas/Ulid'
        nickname:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        timezone:
          type: string
          example: Asia/Shanghai
    Category:
      type: object
      additionalProperties: false
      required: [categoryId, name, sortOrder]
      properties:
        categoryId:
          $ref: '#/components/schemas/Ulid'
        name:
          type: string
        sortOrder:
          type: integer
    CatalogUseCase:
      type: object
      additionalProperties: false
      required: [id, code, name, description, aliases]
      properties:
        id:
          $ref: '#/components/schemas/Ulid'
        code:
          type: string
          pattern: '^[a-z0-9_]{1,64}$'
        name:
          type: string
        description:
          type: string
        aliases:
          type: array
          items:
            type: string
    ProductUseCase:
      type: object
      additionalProperties: false
      required: [id, code, name, weight]
      properties:
        id:
          $ref: '#/components/schemas/Ulid'
        code:
          type: string
        name:
          type: string
        weight:
          type: number
          exclusiveMinimum: 0
          maximum: 1
    ProductSummary:
      type: object
      additionalProperties: false
      required: [productId, categoryId, equipmentRole, name, brand, model, dailyRate, fixedDeposit, useCases]
      properties:
        productId:
          $ref: '#/components/schemas/Ulid'
        categoryId:
          $ref: '#/components/schemas/Ulid'
        equipmentRole:
          type: string
          pattern: '^[a-z0-9_]{1,64}$'
        name:
          type: string
        brand:
          type: string
        model:
          type: string
        dailyRate:
          $ref: '#/components/schemas/Money'
        fixedDeposit:
          $ref: '#/components/schemas/Money'
        availableCount:
          type: integer
          minimum: 0
          description: Present only when a complete rental period was supplied.
        useCases:
          type: array
          items:
            $ref: '#/components/schemas/ProductUseCase'
    ProductDetail:
      type: object
      additionalProperties: false
      required: [productId, categoryId, equipmentRole, name, brand, model, description, dailyRate, fixedDeposit, useCases]
      properties:
        productId:
          $ref: '#/components/schemas/Ulid'
        categoryId:
          $ref: '#/components/schemas/Ulid'
        equipmentRole:
          type: string
          pattern: '^[a-z0-9_]{1,64}$'
        name:
          type: string
        brand:
          type: string
        model:
          type: string
        description:
          type: string
        dailyRate:
          $ref: '#/components/schemas/Money'
        fixedDeposit:
          $ref: '#/components/schemas/Money'
        useCases:
          type: array
          items:
            $ref: '#/components/schemas/ProductUseCase'
    ProductPage:
      type: object
      additionalProperties: false
      required: [items, page, size, totalElements, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    RentalPeriod:
      type: object
      additionalProperties: false
      required: [startAt, endAt]
      properties:
        startAt:
          $ref: '#/components/schemas/Timestamp'
        endAt:
          $ref: '#/components/schemas/Timestamp'
    AvailabilityRequest:
      type: object
      additionalProperties: false
      required: [productId, startAt, endAt]
      properties:
        productId:
          $ref: '#/components/schemas/Ulid'
        startAt:
          $ref: '#/components/schemas/Timestamp'
        endAt:
          $ref: '#/components/schemas/Timestamp'
    AvailabilityResponse:
      type: object
      additionalProperties: false
      required: [productId, startAt, endAt, available, availableCount, checkedAt]
      properties:
        productId:
          $ref: '#/components/schemas/Ulid'
        startAt:
          $ref: '#/components/schemas/Timestamp'
        endAt:
          $ref: '#/components/schemas/Timestamp'
        available:
          type: boolean
        availableCount:
          type: integer
          minimum: 0
        checkedAt:
          $ref: '#/components/schemas/Timestamp'
    QuoteRequest:
      $ref: '#/components/schemas/AvailabilityRequest'
    PriceSnapshot:
      type: object
      additionalProperties: false
      required: [currency, pricingVersion, pricingRule, billingDays, dailyRate, rentalAmount, depositAmount, totalAmount, roundingMode]
      properties:
        currency:
          type: string
          const: CNY
        pricingVersion:
          type: integer
          format: int64
          minimum: 1
        pricingRule:
          type: string
          example: CEIL_24H_FIXED_DEPOSIT
        billingDays:
          type: integer
          minimum: 1
        dailyRate:
          $ref: '#/components/schemas/Money'
        rentalAmount:
          $ref: '#/components/schemas/Money'
        depositAmount:
          $ref: '#/components/schemas/Money'
        totalAmount:
          $ref: '#/components/schemas/Money'
        roundingMode:
          type: string
          const: HALF_UP
    Quote:
      type: object
      additionalProperties: false
      required: [quoteId, productId, startAt, endAt, expiresAt, priceSnapshot]
      properties:
        quoteId:
          $ref: '#/components/schemas/Ulid'
        productId:
          $ref: '#/components/schemas/Ulid'
        startAt:
          $ref: '#/components/schemas/Timestamp'
        endAt:
          $ref: '#/components/schemas/Timestamp'
        expiresAt:
          $ref: '#/components/schemas/Timestamp'
        priceSnapshot:
          $ref: '#/components/schemas/PriceSnapshot'
    CreateReservationRequest:
      type: object
      additionalProperties: false
      required: [quoteId]
      properties:
        quoteId:
          $ref: '#/components/schemas/Ulid'
    ReservationStatus:
      type: string
      enum: [ACTIVE, CONSUMED, RELEASED, EXPIRED]
    Reservation:
      type: object
      additionalProperties: false
      required: [reservationId, sourceQuoteId, productId, equipmentDisplayCode, startAt, endAt, expiresAt, status, effectiveStatus, priceSnapshot]
      properties:
        reservationId:
          $ref: '#/components/schemas/Ulid'
        sourceQuoteId:
          $ref: '#/components/schemas/Ulid'
        productId:
          $ref: '#/components/schemas/Ulid'
        equipmentDisplayCode:
          type: [string, 'null']
          description: Assigned before dispatch; null while the reservation only holds product capacity.
        startAt:
          $ref: '#/components/schemas/Timestamp'
        endAt:
          $ref: '#/components/schemas/Timestamp'
        expiresAt:
          $ref: '#/components/schemas/Timestamp'
        status:
          $ref: '#/components/schemas/ReservationStatus'
        effectiveStatus:
          $ref: '#/components/schemas/ReservationStatus'
        priceSnapshot:
          $ref: '#/components/schemas/PriceSnapshot'
    CreateReviewRequest:
      type: object
      additionalProperties: false
      required: [orderId, rating, content]
      properties:
        orderId:
          $ref: '#/components/schemas/Ulid'
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
          minLength: 1
          maxLength: 1000
    Review:
      type: object
      additionalProperties: false
      required: [reviewId, productId, orderId, rating, content, createdAt]
      properties:
        reviewId:
          $ref: '#/components/schemas/Ulid'
        productId:
          $ref: '#/components/schemas/Ulid'
        orderId:
          $ref: '#/components/schemas/Ulid'
        rating:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
        createdAt:
          $ref: '#/components/schemas/Timestamp'
    CreateOrderRequest:
      type: object
      additionalProperties: false
      required: [quoteId]
      properties:
        quoteId:
          $ref: '#/components/schemas/Ulid'
    OrderStatus:
      type: string
      enum: [PENDING_CONFIRMATION, CONFIRMED, RECEIVED, CANCELLED, EXPIRED]
    Order:
      type: object
      additionalProperties: false
      required: [orderId, sourceReservationId, productId, productName, productModel, equipmentDisplayCode, status, effectiveStatus, startAt, endAt, expiresAt, priceSnapshot, createdAt, confirmedAt, receivedAt, cancelledAt, expiredAt]
      properties:
        orderId:
          $ref: '#/components/schemas/Ulid'
        sourceReservationId:
          $ref: '#/components/schemas/Ulid'
        productId:
          $ref: '#/components/schemas/Ulid'
        productName:
          type: string
        productModel:
          type: string
