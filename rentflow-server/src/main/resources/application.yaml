spring:
  application:
    name: rentflow-server
  datasource:
    url: ${RENTFLOW_DB_URL}
    username: ${RENTFLOW_DB_USERNAME}
    password: ${RENTFLOW_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
  rabbitmq:
    host: ${RENTFLOW_RABBITMQ_HOST:localhost}
    port: ${RENTFLOW_RABBITMQ_PORT:5672}
    username: ${RENTFLOW_RABBITMQ_USERNAME:rentflow}
    password: ${RENTFLOW_RABBITMQ_PASSWORD:rentflow-local}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 500ms
          multiplier: 2
        default-requeue-rejected: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

rentflow:
  jwt:
    private-key-path: ${RENTFLOW_JWT_PRIVATE_KEY_PATH:}
    public-key-path: ${RENTFLOW_JWT_PUBLIC_KEY_PATH:}
    issuer: rentflow-server
    audience: rentflow-platform
    access-token-ttl: PT30M
  reservation:
    ttl-seconds: ${RENTFLOW_RESERVATION_TTL_SECONDS:900}
    max-active-per-user: ${RENTFLOW_MAX_ACTIVE_RESERVATIONS:3}
    cleanup-batch-size: ${RENTFLOW_RESERVATION_CLEANUP_BATCH_SIZE:100}
    cleanup-fixed-delay-millis: ${RENTFLOW_RESERVATION_CLEANUP_DELAY_MILLIS:60000}
  quote:
    ttl-seconds: ${RENTFLOW_QUOTE_TTL_SECONDS:300}
  rental:
    business-zone: ${RENTFLOW_RENTAL_BUSINESS_ZONE:Asia/Shanghai}
  order:
    cleanup-batch-size: ${RENTFLOW_ORDER_CLEANUP_BATCH_SIZE:100}
    cleanup-fixed-delay-millis: ${RENTFLOW_ORDER_CLEANUP_DELAY_MILLIS:60000}
    confirmation-reminder-window-millis: ${RENTFLOW_ORDER_CONFIRMATION_REMINDER_WINDOW_MILLIS:300000}
    confirmation-reminder-batch-size: ${RENTFLOW_ORDER_CONFIRMATION_REMINDER_BATCH_SIZE:100}
    confirmation-reminder-fixed-delay-millis: ${RENTFLOW_ORDER_CONFIRMATION_REMINDER_DELAY_MILLIS:60000}
  store:
    payment-ttl-minutes: ${RENTFLOW_STORE_PAYMENT_TTL_MINUTES:15}
    cleanup-batch-size: ${RENTFLOW_STORE_CLEANUP_BATCH_SIZE:100}
    cleanup-fixed-delay-millis: ${RENTFLOW_STORE_CLEANUP_DELAY_MILLIS:60000}
  cors:
    allowed-origins: ${RENTFLOW_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  database-retry:
    max-attempts: ${RENTFLOW_DB_DEADLOCK_MAX_ATTEMPTS:3}
    backoff-millis: ${RENTFLOW_DB_DEADLOCK_BACKOFF_MILLIS:25}
  idempotency:
    wait-timeout-seconds: ${RENTFLOW_IDEMPOTENCY_WAIT_TIMEOUT_SECONDS:2}
    retry-after-seconds: ${RENTFLOW_IDEMPOTENCY_RETRY_AFTER_SECONDS:1}
  messaging:
    enabled: ${RENTFLOW_MESSAGING_ENABLED:true}
    publish-batch-size: ${RENTFLOW_OUTBOX_PUBLISH_BATCH_SIZE:100}
    publish-fixed-delay-millis: ${RENTFLOW_OUTBOX_PUBLISH_DELAY_MILLIS:1000}
    confirm-timeout-millis: ${RENTFLOW_RABBITMQ_CONFIRM_TIMEOUT_MILLIS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
